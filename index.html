<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi-Bill Manager v10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .hidden { display: none !important; }
        .active-card { border: 2px solid #4f46e5 !important; background-color: #f5f3ff !important; }
        body { padding-bottom: 90px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- HEADER TETAP -->
    <header class="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-lg font-bold">WiFi-Bill Manager</h1>
        <div class="flex gap-4 text-xl">
            <button onclick="backupData()" title="Simpan Cadangan">💾</button>
            <label class="cursor-pointer">📂<input type="file" id="restoreFile" class="hidden" onchange="restoreData(event)"></label>
        </div>
    </header>

    <main class="p-4">
        
        <!-- SECTION 1: HOME (HANYA RINGKASAN) -->
        <section id="dashboard">
            <div class="text-center py-4 mb-6">
                <h2 class="text-xl font-bold mb-1">Selamat Datang</h2>
                <p id="current-month" class="text-indigo-600 text-xs font-bold uppercase"></p>
            </div>
            
            <div class="space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 text-center">
                    <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Total Saldo Bersih</p>
                    <p id="dash-saldo" class="text-3xl font-black text-indigo-700">Rp 0</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-2xl border-l-4 border-green-500 shadow-sm">
                        <p class="text-[9px] text-gray-400 font-bold uppercase">Uang Masuk</p>
                        <p id="dash-masuk" class="text-sm font-bold text-green-600">Rp 0</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border-l-4 border-red-500 shadow-sm">
                        <p class="text-[9px] text-gray-400 font-bold uppercase">Pengeluaran</p>
                        <p id="dash-keluar" class="text-sm font-bold text-red-600">Rp 0</p>
                    </div>
                </div>
            </div>

            <div class="mt-10 p-6 bg-white rounded-3xl border border-gray-100 shadow-sm text-center">
                <p class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-widest">Pengaturan Sistem</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="resetBulanan()" class="bg-orange-100 text-orange-600 py-4 rounded-2xl text-[10px] font-bold uppercase">Reset Bulan Baru</button>
                    <button onclick="hapusSemuaData()" class="bg-red-100 text-red-600 py-4 rounded-2xl text-[10px] font-bold uppercase">Hapus Semua Data</button>
                </div>
            </div>
        </section>

        <!-- SECTION 2: DATA PELANGGAN (BERSIH) -->
        <section id="pelanggan" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-indigo-900">Database Pelanggan</h2>
                <button onclick="openModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow">+ Tambah</button>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-indigo-50 mb-6">
                <p class="text-[10px] font-bold text-indigo-600 uppercase mb-3">Import Data Excel</p>
                <div class="flex flex-col gap-3">
                    <input type="file" id="importFile" accept=".xlsx, .xls" class="text-xs w-full p-2 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">
                    <button onclick="importExcelSmart()" class="bg-green-600 text-white py-3 rounded-2xl text-xs font-bold uppercase shadow-md">Proses Import</button>
                </div>
            </div>

            <div id="list-pelanggan" class="space-y-3">
                <!-- List data pelanggan muncul di sini -->
            </div>
        </section>

        <!-- SECTION 3: TAGIHAN (BERSIH) -->
        <section id="tagihan" class="hidden">
            <h2 class="text-lg font-bold mb-4 text-indigo-900">Daftar Penagihan</h2>
            <div class="mb-5">
                <input type="text" id="searchInput" oninput="renderTagihan()" placeholder="Cari nama atau alamat..." class="w-full p-4 border rounded-3xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
            </div>
            
            <div id="list-tagihan" class="space-y-3">
                <!-- Orang yang belum bayar muncul di sini -->
            </div>
        </section>

        <!-- SECTION 4: KAS (LAPORAN) -->
        <section id="keuangan" class="hidden">
            <h2 class="text-lg font-bold mb-4 text-indigo-900">Laporan Kas</h2>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div id="card-masuk" onclick="renderKasView('masuk')" class="bg-white p-4 rounded-2xl border-2 border-transparent shadow-sm cursor-pointer">
                    <p class="text-[9px] text-green-600 font-bold uppercase">Lunas</p>
                    <p id="kas-masuk" class="text-xs font-bold">Rp 0</p>
                </div>
                <div id="card-keluar" onclick="renderKasView('keluar')" class="bg-white p-4 rounded-2xl border-2 border-transparent shadow-sm cursor-pointer">
                    <p class="text-[9px] text-red-600 font-bold uppercase">Keluar</p>
                    <p id="kas-keluar" class="text-xs font-bold">Rp 0</p>
                </div>
                <div id="card-total" onclick="renderKasView('total')" class="bg-white p-4 rounded-2xl border-2 border-transparent shadow-sm cursor-pointer">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">User</p>
                    <p id="kas-total" class="text-xs font-bold">0</p>
                </div>
                <div id="card-belum" onclick="renderKasView('belum')" class="bg-white p-4 rounded-2xl border-2 border-transparent shadow-sm cursor-pointer">
                    <p class="text-[9px] text-orange-600 font-bold uppercase">Belum</p>
                    <p id="kas-belum" class="text-xs font-bold">0</p>
                </div>
            </div>

            <div class="bg-indigo-50 p-4 rounded-3xl border border-indigo-100 mb-6">
                <p class="text-[10px] font-bold text-indigo-700 mb-2 uppercase tracking-tighter">Ekspor Excel Per Tanggal</p>
                <div class="flex gap-2">
                    <input type="date" id="filterTglExport" class="flex-1 p-3 rounded-xl text-xs border-none shadow-sm outline-none">
                    <button onclick="exportLunasHarian()" class="bg-indigo-600 text-white px-4 py-3 rounded-xl text-[10px] font-bold shadow uppercase">Ekspor</button>
                </div>
            </div>

            <div id="form-pengeluaran" class="bg-white p-5 rounded-3xl shadow-sm mb-4 border border-red-500 hidden">
                <p class="text-[10px] font-bold text-red-600 mb-3 uppercase">Catat Pengeluaran</p>
                <input type="text" id="ket-keluar" placeholder="Keterangan..." class="w-full p-2 border mb-2 rounded-lg text-sm outline-none">
                <input type="number" id="nom-keluar" placeholder="Nominal (Rp)..." class="w-full p-2 border mb-2 rounded-lg text-sm outline-none">
                <button onclick="tambahPengeluaran()" class="bg-red-500 text-white w-full py-2 rounded-xl text-xs font-bold uppercase">Simpan</button>
            </div>

            <div id="kas-detail-list" class="space-y-2"></div>
        </section>
    </main>

    <!-- MODAL FORM -->
    <div id="modalPelanggan" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold mb-4 text-indigo-900">Input Data</h3>
            <input type="hidden" id="editId">
            <div class="space-y-4 text-sm">
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Nama</label><input type="text" id="f_nama" class="w-full p-3 bg-gray-50 rounded-2xl outline-none border"></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Tgl Tagihan</label><input type="number" id="f_tgl" class="w-full p-3 bg-gray-50 rounded-2xl outline-none border"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Harga</label><input type="number" id="f_jumlah" class="w-full p-3 bg-gray-50 rounded-2xl outline-none border"></div>
                </div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">WA (628...)</label><input type="number" id="f_wa" class="w-full p-3 bg-gray-50 rounded-2xl outline-none border"></div>
                <div><label class="text-[10px] font-bold text-gray-400 uppercase">Alamat</label><textarea id="f_alamat" class="w-full p-3 bg-gray-50 rounded-2xl outline-none border" rows="2"></textarea></div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-3 text-gray-400 font-bold uppercase text-[10px]">Batal</button>
                <button onclick="simpanPelanggan()" class="flex-1 py-3 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-[10px]">Simpan</button>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 shadow-2xl z-50 rounded-t-3xl">
        <button onclick="showSection('dashboard')" class="nav-btn flex flex-col items-center text-indigo-600" data-section="dashboard">🏠<span class="text-[9px] font-bold uppercase">Home</span></button>
        <button onclick="showSection('pelanggan')" class="nav-btn flex flex-col items-center text-gray-400" data-section="pelanggan">👥<span class="text-[9px] font-bold uppercase">Data</span></button>
        <button onclick="showSection('tagihan')" class="nav-btn flex flex-col items-center text-gray-400" data-section="tagihan">🧾<span class="text-[9px] font-bold uppercase">Tagihan</span></button>
        <button onclick="showSection('keuangan')" class="nav-btn flex flex-col items-center text-gray-400" data-section="keuangan">💰<span class="text-[9px] font-bold uppercase">Kas</span></button>
    </nav>

    <script>
        let dataPelanggan = JSON.parse(localStorage.getItem('wifi_v10_db')) || [];
        let dataPengeluaran = JSON.parse(localStorage.getItem('wifi_v10_ex')) || [];
        let currentKasView = 'masuk';

        function save() {
            localStorage.setItem('wifi_v10_db', JSON.stringify(dataPelanggan));
            localStorage.setItem('wifi_v10_ex', JSON.stringify(dataPengeluaran));
            refreshUI();
        }

        function refreshUI() {
            const now = new Date();
            const bulan = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
            const tglBulan = document.getElementById('current-month');
            if(tglBulan) tglBulan.innerText = `${bulan[now.getMonth()]} ${now.getFullYear()}`;
            
            renderDashboard();
            renderPelanggan();
            renderTagihan();
            renderKasView(currentKasView);
        }

        // --- FUNGSI PINDAH HALAMAN (DIPERBAIKI) ---
        function showSection(id) {
            // Sembunyikan SEMUA section tanpa kecuali
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            
            // Tampilkan hanya section yang diklik
            const target = document.getElementById(id);
            if(target) target.classList.remove('hidden');

            // Update warna icon navigasi
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.replace('text-indigo-600', 'text-gray-400');
                if(btn.dataset.section === id) btn.classList.replace('text-gray-400', 'text-indigo-600');
            });
        }

        // --- MANAJEMEN DATA ---
        function renderDashboard() {
            const masuk = dataPelanggan.filter(p => p.status === 'Lunas').reduce((s, p) => s + p.jumlah, 0);
            const keluar = dataPengeluaran.reduce((s, p) => s + p.nominal, 0);
            document.getElementById('dash-saldo').innerText = `Rp ${(masuk - keluar).toLocaleString()}`;
            document.getElementById('dash-masuk').innerText = `Rp ${masuk.toLocaleString()}`;
            document.getElementById('dash-keluar').innerText = `Rp ${keluar.toLocaleString()}`;
            
            document.getElementById('kas-masuk').innerText = `Rp ${masuk.toLocaleString()}`;
            document.getElementById('kas-keluar').innerText = `Rp ${keluar.toLocaleString()}`;
            document.getElementById('kas-total').innerText = dataPelanggan.length;
            document.getElementById('kas-belum').innerText = dataPelanggan.filter(p => p.status === 'Belum Bayar').length;
        }

        function renderPelanggan() {
            const list = document.getElementById('list-pelanggan');
            list.innerHTML = dataPelanggan.map(p => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center">
                    <div class="w-2/3"><p class="font-bold text-indigo-900">${p.nama || 'N/A'}</p><p class="text-[9px] text-gray-400 uppercase font-bold">Tgl: ${p.tgl} • Rp ${p.jumlah.toLocaleString()}</p></div>
                    <div class="flex gap-4"><button onclick="openModal(${p.id})" class="text-blue-500 font-bold text-[10px] uppercase">Edit</button><button onclick="hapusPelanggan(${p.id})" class="text-red-400 font-bold text-[10px] uppercase">Hapus</button></div>
                </div>`).join('');
        }

        function renderTagihan() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('list-tagihan');
            const filterBelum = dataPelanggan.filter(p => p.status === 'Belum Bayar');
            const searchRes = filterBelum.filter(p => p.nama.toLowerCase().includes(s) || (p.alamat||'').toLowerCase().includes(s) || p.tgl.toString() === s);
            
            list.innerHTML = searchRes.map(p => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border flex justify-between items-center border-l-4 border-l-indigo-600">
                    <div class="w-2/3"><p class="font-black text-gray-800">${p.nama}</p><p class="text-indigo-600 font-bold text-xs">Rp ${p.jumlah.toLocaleString()}</p><p class="text-[8px] text-gray-400 uppercase">${p.alamat || '-'}</p></div>
                    <button onclick="bayar(${p.id})" class="bg-indigo-600 text-white px-5 py-2 rounded-2xl text-[10px] font-bold shadow uppercase">Bayar</button>
                </div>`).join('') || '<p class="text-center py-10 text-xs text-gray-400 font-bold uppercase italic">Semua sudah lunas!</p>';
        }

        function bayar(id) {
            const idx = dataPelanggan.findIndex(p => p.id === id);
            dataPelanggan[idx].status = 'Lunas';
            dataPelanggan[idx].tglPelunasan = new Date().toISOString().split('T')[0];
            save();
        }

        function batalBayar(id) {
            if(confirm("Batalkan pembayaran ini?")) {
                const idx = dataPelanggan.findIndex(p => p.id === id);
                dataPelanggan[idx].status = 'Belum Bayar';
                delete dataPelanggan[idx].tglPelunasan;
                save();
            }
        }

        function renderKasView(type) {
            currentKasView = type;
            const container = document.getElementById('kas-detail-list');
            document.querySelectorAll('#keuangan .bg-white').forEach(c => c.classList.remove('active-card'));
            document.getElementById(`card-${type}`).classList.add('active-card');
            document.getElementById('form-pengeluaran').classList.toggle('hidden', type !== 'keluar');

            let html = '';
            if (type === 'masuk') {
                html = dataPelanggan.filter(p => p.status === 'Lunas').map(p => `
                    <div class="bg-white p-3 rounded-2xl border shadow-sm flex justify-between items-center">
                        <div class="text-xs"><b>${p.nama}</b><br><small class="text-gray-400">Tgl Bayar: ${p.tglPelunasan || '-'}</small></div>
                        <div class="flex items-center gap-3"><span class="font-bold text-green-600 text-xs">Rp ${p.jumlah.toLocaleString()}</span><button onclick="batalBayar(${p.id})" class="text-red-500 text-[10px] font-bold uppercase p-1 px-2 bg-red-50 rounded-lg">Batal</button></div>
                    </div>`).join('');
            } else if (type === 'keluar') {
                html = dataPengeluaran.map((p, i) => `<div class="bg-white p-3 rounded-2xl border flex justify-between items-center text-xs"><span>${p.ket}</span><div class="flex items-center gap-3"><b>Rp ${p.nominal.toLocaleString()}</b><button onclick="hapusEx(${i})" class="text-gray-300 font-bold">✕</button></div></div>`).join('');
            } else if (type === 'total') {
                html = dataPelanggan.map(p => `<div class="bg-white p-2 rounded shadow-sm border text-[9px] mb-1 flex justify-between"><span>${p.nama}</span><span class="${p.status==='Lunas'?'text-green-600':'text-orange-500'} font-bold uppercase">${p.status}</span></div>`).join('');
            } else if (type === 'belum') {
                html = dataPelanggan.filter(p => p.status === 'Belum Bayar').map(p => `<div class="bg-white p-3 rounded-2xl border flex justify-between items-center text-xs"><span>${p.nama}</span><span class="font-bold text-red-500">Rp ${p.jumlah.toLocaleString()}</span></div>`).join('');
            }
            container.innerHTML = html || '<p class="text-center py-4 text-[10px] text-gray-400 font-bold uppercase tracking-widest italic">Tidak ada data</p>';
        }

        // --- FITUR IMPORT ---
        function importExcelSmart() {
            const f = document.getElementById('importFile').files[0]; if(!f) return alert("Pilih file!");
            const r = new FileReader(); r.onload = (e) => {
                const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type:'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type:'array'}).SheetNames[0]]);
                json.forEach(row => {
                    let n, t, h, a, w;
                    Object.keys(row).forEach(k => {
                        let c = k.toString().toLowerCase().trim().replace(/\s/g, '');
                        if(c.includes('nama')) n = row[k]; if(c.includes('tgl')||c.includes('tanggal')) t = row[k]; if(c.includes('harga')||c.includes('tagihan')||c.includes('jumlah')) h = row[k]; if(c.includes('alamat')) a = row[k]; if(c.includes('wa')||c.includes('hp')) w = row[k];
                    });
                    if(n) {
                        let hargaVal = parseInt(h)||0; if(hargaVal < 2000) hargaVal *= 1000;
                        dataPelanggan.push({ id: Date.now()+Math.random(), nama: n.toString().trim(), tgl: t||"1", jumlah: hargaVal, wa: w||"", alamat: a||"", status: 'Belum Bayar' });
                    }
                });
                save(); alert("Berhasil Import!");
            }; r.readAsArrayBuffer(f);
        }

        function exportLunasHarian() {
            const t = document.getElementById('filterTglExport').value; if(!t) return alert("Pilih tgl!");
            const l = dataPelanggan.filter(p => p.status === 'Lunas' && p.tglPelunasan === t);
            if(l.length === 0) return alert("Data kosong!");
            const d = l.map((p, i) => ({ "No": i+1, "Nama": p.nama, "Harga": p.jumlah, "Tgl Bayar": p.tglPelunasan }));
            d.push({ "No": "", "Nama": "TOTAL", "Harga": l.reduce((s, p) => s + p.jumlah, 0) });
            XLSX.writeFile(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(d), `Laporan_${t}.xlsx`);
        }

        function resetBulanan() { if(confirm("Mulai bulan baru? Status Lunas akan di-reset.")) { dataPelanggan.forEach(p => { p.status = 'Belum Bayar'; delete p.tglPelunasan; }); save(); } }
        function hapusSemuaData() { if(confirm("HAPUS SEMUA DATA?")) { dataPelanggan = []; dataPengeluaran = []; save(); } }
        function backupData() { const blob = new Blob([JSON.stringify({ pel: dataPelanggan, ex: dataPengeluaran })], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_wifi.json`; a.click(); }
        function restoreData(e) { const r = new FileReader(); r.onload = (e) => { const d = JSON.parse(e.target.result); dataPelanggan = d.pel; dataPengeluaran = d.ex; save(); alert("Data Pulih!"); }; r.readAsText(e.target.files[0]); }
        function openModal(id = null) {
            document.getElementById('modalPelanggan').classList.remove('hidden');
            if(id) {
                const p = dataPelanggan.find(i => i.id === id);
                document.getElementById('editId').value = p.id; document.getElementById('f_nama').value = p.nama; document.getElementById('f_tgl').value = p.tgl; document.getElementById('f_jumlah').value = p.jumlah; document.getElementById('f_wa').value = p.wa || ""; document.getElementById('f_alamat').value = p.alamat;
            } else {
                document.getElementById('editId').value = ""; document.getElementById('f_nama').value = ""; document.getElementById('f_tgl').value = ""; document.getElementById('f_jumlah').value = ""; document.getElementById('f_wa').value = ""; document.getElementById('f_alamat').value = "";
            }
        }
        function closeModal() { document.getElementById('modalPelanggan').classList.add('hidden'); }
        function simpanPelanggan() {
            const id = document.getElementById('editId').value;
            const p = { id: id ? parseFloat(id) : Date.now(), nama: document.getElementById('f_nama').value, tgl: document.getElementById('f_tgl').value, jumlah: parseInt(document.getElementById('f_jumlah').value) || 0, wa: document.getElementById('f_wa').value, alamat: document.getElementById('f_alamat').value, status: 'Belum Bayar' };
            if(!p.nama) return;
            if(id) { const i = dataPelanggan.findIndex(x => x.id == id); p.status = dataPelanggan[i].status; dataPelanggan[i] = p; } else { dataPelanggan.push(p); }
            save(); closeModal();
        }
        function hapusPelanggan(id) { if(confirm("Hapus?")) { dataPelanggan = dataPelanggan.filter(p => p.id !== id); save(); } }
        function tambahPengeluaran() { const k = document.getElementById('ket-keluar').value, n = parseInt(document.getElementById('nom-keluar').value); if(k && n) { dataPengeluaran.push({ ket: k, nominal: n, tgl: new Date().toLocaleDateString() }); save(); } }
        function hapusEx(i) { dataPengeluaran.splice(i, 1); save(); }

        refreshUI();
    </script>
</body>
</html>
